irq_cntlr: interrupt-controller@f8f01000 {
    compatible = "arm,cortex-a9-gic";
    #interrupt-cells = <3>;        /* 3个cell描述一个中断 */
    interrupt-controller;
    reg = <0xf8f01000 0x1000>,    /* GICD: Distributor基址 */
          <0xf8f00100 0x100>;     /* GICC: CPU Interface基址 */
};

/* 外设节点引用GIC */
uart0: serial@e0000000 {
    compatible = "xlnx,xuartps";
    interrupt-parent = <&irq_cntlr>;
    /* cell1: 0=SPI, 1=PPI
       cell2: 中断号 (SPI范围 0-987)
       cell3: 触发标志 (4=高电平, 1=上升沿) */
    interrupts = <0 59 4>;
};`})]}),u.jsxs("div",{className:"info-box",children:[u.jsx("div",{className:"info-box-title",children:"🔑 GICv2 vs GICv3 关键差异"}),u.jsxs("ul",{children:[u.jsx("li",{children:"GICv2：GICC 寄存器区（内存映射），最多 8 CPU 核"}),u.jsx("li",{children:"GICv3：GICR（每 CPU 一个 Redistributor），系统寄存器 ICC_*，支持 1024+ CPU"}),u.jsx("li",{children:"GICv3 新增 LPI 类型，通过 ITS 支持 MSI/MSI-X，适用于 PCIe"}),u.jsx("li",{children:"GICv3 Extended SPI/PPI 范围大幅扩展"})]})]})]}),u.jsxs("section",{ref:j("topology"),id:"topology",className:"section",children:[u.jsx("h2",{className:"section-h2",children:"4. 中断拓扑结构"}),u.jsxs("div",{className:"source-badge",children:[u.jsx("span",{children:"📚 来源："}),u.jsx("a",{href:"https://www.kernel.org/doc/html/latest/core-api/irq/irq-domain.html",target:"_blank",rel:"noopener",children:"kernel.org — IRQ Domain Documentation"})]}),u.jsx("h3",{className:"section-h3",children:"4.1 级联中断控制器"}),u.jsx("p",{children:"内核官方文档描述了多控制器级联场景："}),u.jsx("blockquote",{children:`"On some architectures, there may be multiple interrupt controllers involved in delivering an interrupt from the device to the target CPU. Let's look at a typical interrupt delivery path on x86 platforms: Device → IOAPIC → Interrupt remapping Controller → Local APIC → CPU"`}),u.jsx("div",{className:"svg-wrap",children:u.jsxs("svg",{viewBox:"0 0 700 340",xmlns:"http://www.w3.org/2000/svg",className:"diagram-svg",children:[u.jsxs("defs",{children:[u.jsx("marker",{id:"arr2",markerWidth:"8",markerHeight:"8",refX:"6",refY:"3",orient:"auto",children:u.jsx("path",{d:"M0,0 L0,6 L8,3 z",fill:"#94a3b8"})}),u.jsx("marker",{id:"arr3",markerWidth:"8",markerHeight:"8",refX:"6",refY:"3",orient:"auto",children:u.jsx("path",{d:"M0,0 L0,6 L8,3 z",fill:"#60a5fa"})})]}),u.jsx("text",{x:"10",y:"50",fill:"#475569",fontSize:"11",children:"设备层"}),u.jsx("text",{x:"10",y:"140",fill:"#475569",fontSize:"11",children:"从控制器"}),u.jsx("text",{x:"10",y:"220",fill:"#475569",fontSize:"11",children:"主控制器"}),u.jsx("text",{x:"10",y:"300",fill:"#475569",fontSize:"11",ch handle_level_irq:
    desc->irq_data.chip->irq_mask_ack();   // mask+ack
    handle_irq_event(desc->action);         // 调用 ISR
    desc->irq_data.chip->irq_unmask();     // unmask

/* Fast EOI IRQ Flow */
handle_fasteoi_irq:
    handle_irq_event(desc->action);         // 调用 ISR
    desc->irq_data.chip->irq_eoi();        // 末尾 EOI

/* Edge IRQ Flow */
handle_edge_irq:
    if (desc->status & running) {
        desc->irq_data.chip->irq_mask_ack();
        desc->status |= pending | masked;
        return;
    }
    desc->irq_data.chip->irq_ack();
    desc->status |= running;
    do {
        if (desc->status & masked)
            desc->irq_data.chip->irq_unmask();
        desc->status &= ~pending;
        handle_irq_event(desc->action);
    } while (desc->status & pending);
    desc->status &= ~running;`})]}),u.jsx("h3",{className:"section-h3",children:"6.2 延迟中断禁用（Delayed Interrupt Disable）"}),u.jsxs("blockquote",{children:['"This per interrupt selectable feature, which was introduced by Russell King in the ARM interrupt implementation, does not mask an interrupt at the hardware level when disable_irq() is called. The interrupt is kept enabled and is masked in the flow handler when an interrupt event happens. This prevents losing edge interrupts on hardware which does not store an edge interrupt event while the interrupt is disabled at the hardware level."',u.jsx("cite",{children:"— kernel.org, Generic IRQ Handling"})]})]}),u.jsxs("section",{ref:j("domain"),id:"domain",className:"section",children:[u.jsx("h2",{className:"section-h2",children:"7. IRQ Domain 机制"}),u.jsxs("div",{className:"source-badge",children:[u.jsx("span",{children:"📚 来源："}),u.jsx("a",{href:"https://www.kernel.org/doc/html/latest/core-api/irq/irq-domain.html",target:"_blank",rel:"noopener",children:"The irq_domain Interrupt Number Mapping Library — The Linux Kernel documentation"})]}),u.jsx("p",{children:"内核文档解释 irq_domain 存在的根本原因："}),u.jsx("blockquote",{children:'"The current design of the Linux kernel uses a single large number space where each separate IRQ source is assigned a unique number... For this reason, we need a mechanism to separate controller-local interrupt numbers, called hardware IRQs, from Linux IRQ numbers."'}),u.jsx("h3",{className:"section-h3",children:"7.1 hwirq vs virq（Linux IRQ 号）"}),u.jsx("div",{className:"svg-wrap",children:u.jsxs("svg",{viewBox:"0 0 660 200",xmlns:"http://www.w3.org/2000/svg",className:"diagram-svg",children:[u.jsx("defs",{children:u.jsx("marker",{id:"marr",markerWidth:"8",markerHeight:"8",refX:"6",refY:"3",orient:"auto",children:u.jsx("path",{d:"M0,0 L0,6 L8,3 z",fill:"#60a5fa"})})}),u.jsx("rect",{x:"10",y:"40",width:"200",height:"120",rx:"8",fill:"#1e293b",stroke:"#f59e0b",strokeWidth:"1.5"}),u.jsx("text",{x:"110",y:"62",te     void (*free)(struct irq_domain *d, unsigned int virq,
                 unsigned int nr_irqs);
    int (*activate)(struct irq_domain *d, struct irq_data *irqd,
                    bool reserve);
    void (*deactivate)(struct irq_domain *d, struct irq_data *irq_data);

#include <linux/irqdomain.h>
#include <linux/interrupt.h>
#include <linux/of_irq.h>

/* irq_chip 操作集 */
static void myctrl_irq_mask(struct irq_data *d) {
    struct myctrl_priv *priv = irq_data_get_irq_chip_data(d);
    writel(BIT(d->hwirq), priv->base + DISABLE_REG);
}
static void myctrl_irq_unmask(struct irq_data *d) {
    struct myctrl_priv *priv = irq_data_get_irq_chip_data(d);
    writel(BIT(d->hwirq), priv->base + ENABLE_REG);
}
static void myctrl_irq_ack(struct irq_data *d) {
    struct myctrl_priv *priv = irq_data_get_irq_chip_data(d);
    writel(BIT(d->hwirq), priv->base + ACK_REG);
}

static struct irq_chip myctrl_irq_chip = {
    .name        = "myctrl",
    .irq_mask    = myctrl_irq_mask,
    .irq_unmask  = myctrl_irq_unmask,
    .irq_ack     = myctrl_irq_ack,
};

/* irq_domain ops：建立 hwirq->virq 映射 */
static int myctrl_irq_map(struct irq_domain *d, unsigned int virq,
                           irq_hw_number_t hwirq) {
    struct myctrl_priv *priv = d->host_data;
    /* 绑定 chip 和 flow handler */
    irq_set_chip_and_handler(virq, &myctrl_irq_chip,
                              handle_edge_irq);  /* 或 handle_level_irq */
    irq_set_chip_data(virq, priv);
    return 0;
}

static const struct irq_domain_ops myctrl_domain_ops = {
    .map    = myctrl_irq_map,
    .xlate  = irq_domain_xlate_twocell,  /* 标准2-cell DT解析 */
};

/* 级联中断处理：从父 GIC 调用 */
static irqreturn_t myctrl_irq_handler(int irq, void *dev_id) {
    struct myctrl_priv *priv = dev_id;
    u32 pending = readl(priv->base + PENDING_REG);
    while (pending) {
        int hwirq = __ffs(pending);
        pending &= ~BIT(hwirq);
        /* 将 hwirq 转换为 virq 并分发 */
        generic_handle_domain_irq(priv->domain, hwirq);
    }
    return IRQ_HANDLED;
}

/* probe 函数 */
static int myctrl_probe(struct platform_device *pdev) {
    struct myctrl_priv *priv;
    struct fwnode_handle *fwnode;
    int parent_irq;

    priv = devm_kzalloc(&pdev->dev, sizeof(*priv), GFP_KERNEL);
    priv->base = devm_platform_ioremap_resource(pdev, 0);

    fwnode = of_node_to_fwnode(pdev->dev.of_node);

    /* 创建 linear irq_domain（推荐方式）*/
    priv->domain = irq_domain_create_linear(fwnode, NR_IRQS,
                                             &myctrl_domain_ops, priv);

    /* 向父控制器注册级联中断 */
    parent_irq = platform_get_irq(pdev, 0);
    return devm_request_irq(&pdev->dev, parent_irq,
                             myctrl_irq_handler, IRQF_SHARED,
                             "myctrl", priv);
}`})]}),u.jsx("h3",{className:"section-h3",children:"9.3 设备驱动中断注册（消费者侧）"}),u.jsxs("div",{className:"code-block",children:[u.jsx("div",{className:"code-header",children:"设备驱动消费者侧：使用 request_threaded_irq"}),u.jsx("pre",{children:`static irqreturn_t mydev_irq_handler(int irq, void *data) {
    struct mydev_priv *priv = data;
    /* Top half: 仅做最少工作 */
    /* 读取状态寄存器，清除中断标志 */
    priv->status = readl(priv->base + STATUS_REG);
    /* 返回 IRQ_WAKE_THREAD 让 bottom half 处理 */
    return IRQ_WAKE_THREAD;
}

static irqreturn_t mydev_irq_thread(int irq, void *data) {
    struct mydev_priv *priv = data;
    /* Bottom half: 可以睡眠，执行耗时操作 */
    process_data(priv->status);
    return IRQ_HANDLED;
}

static int mydev_probe(struct platform_device *pdev) {
    struct mydev_priv *priv;
    int irq;

    /* 从设备树获取 IRQ 号（推荐方式） */
    irq = platform_get_irq(pdev, 0);
    if (irq < 0)
        return irq;

    /* 注册线程化中断 */
    return devm_request_threaded_irq(&pdev->dev, irq,
        mydev_irq_handler,    /* top half */
        mydev_irq_thread,     /* bottom half(线程) */
        IRQF_ONESHOT,         /* 线程运行期间保持 mask */
        "mydev", priv);
}`})]})]}),u.jsxs("section",{ref:j("debug"),id:"debug",className:"section",children:[u.jsx("h2",{className:"section-h2",children:"10. 调试与诊断"}),u.jsxs("div",{className:"source-badge",children:[u.jsx("span",{children:"📚 来源："}),u.jsx("a",{href:"https://www.kernel.org/doc/html/latest/core-api/irq/irq-domain.html#debugging",target:"_blank",rel:"noopener",children:"IRQ Domain — Debugging"}),u.jsx("span",{children:" · "}),u.jsx("a",{href:"https://docs.kernel.org/core-api/genericirq.html",target:"_blank",rel:"noopener",children:"Generic IRQ Handling"})]}),u.jsx("h3",{className:"section-h3",children:"10.1 /proc/interrupts"}),u.jsxs("div",{className:"code-block",children:[u.jsx("div",{className:"code-header",children:"/proc/interrupts — 查看系统所有中断统计"}),u.jsx("pre",{children:`$ cat /proc/interrupts

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
          --bg: #0f172a;
          --bg2: #1e293b;
          --sidebar-w: 260px;
          --accent: #60a5fa;
          --text: #e2e8f0;
          --text-muted: #94a3b8;
          --border: #334155;
          --header-h: 52px;
          --progress-h: 3px;
        }

        html, body, #root {
          height: 100%;
          background: var(--bg);
          color: var(--text);
          font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
          font-size: 15px;
          line-height: 1.7;
        }

        .app-root {
          display: flex;
          flex-direction: column;
          height: 100vh;
          overflow: hidden;
        }

        /* Progress */
        .progress-bar-track {
          position: fixed;
          top: 0; left: 0; right: 0;
          height: var(--progress-h);
          background: var(--border);
          z-index: 1000;
        }
        .progress-bar-fill {
          height: 100%;
          background: linear-gradient(90deg, #3b82f6, #a78bfa);
          transition: width 0.2s;
        }

        /* Mobile header */
        .mobile-header {
          display: none;
          align-items: center;
          gap: 12px;
          padding: 0 16px;
          height: var(--header-h);
          background: var(--bg2);
          border-bottom: 1px solid var(--border);
          position: fixed;
          top: var(--progress-h);
          left: 0; right: 0;
          z-index: 200;
        }
        .burger-btn {
          background: none;
          border: none;
          cursor: pointer;
          display: flex;
          flex-direction: column;
          gap: 5px;
          padding: 4px;
        }
        .burger-btn span {
          display: block;
          width: 22px;
          height: 2px;
          background: var(--text);
          border-radius: 2px;
        }
        .mobile-title {
          flex: 1;
          font-weight: 600;
          font-size: 14px;
          color: var(--accent);
        }
        .mobile-progress {
          font-size: 12px;
          color: var(--text-muted);
        }

        /* Layout */
        .layout {
          display: flex;
          flex: 1;
          overflow: hidden;
          margin-top: var(--progress-h);
        }

        /* Sidebar overlay */
        .sidebar-overlay {
          display: none;
        }

        /* Sidebar */
        .sidebar {
          width: var(--sidebar-w);
          flex-shrink: 0;
          background: var(--bg2);
          border-right: 1px solid var(--border);
          overflow-y: auto;
          display: flex;
          flex-direction: column;
          padding-bottom: 24px;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .sidebar-header {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 20px 16px 16px;
          border-bottom: 1px solid var(--border);
        }
        .sidebar-logo {
          font-size: 28px;
        }
        .sidebar-title {
          font-weight: 700;
          font-size: 14px;
          color: var(--accent);
        }
        .sidebar-sub {
          font-size: 11px;
          color: var(--text-muted);
        }

        .nav-group {
          padding: 12px 8px 0;
        }
        .nav-group-label {
          font-size: 10px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          color: var(--text-muted);
          padding: 0 8px 6px;
        }
        .nav-item {
          display: block;
          width: 100%;
          text-align: left;
          background: none;
          border: none;
          color: var(--text-muted);
          font-size: 13px;
          padding: 7px 8px;
          border-radius: 6px;
          cursor: pointer;
          transition: all 0.15s;
          line-height: 1.4;
        }
        .nav-item:hover {
          background: rgba(96,165,250,0.08);
          color: var(--text);
        }
        .nav-item.active {
          background: rgba(96,165,250,0.15);
          color: var(--accent);
          font-weight: 600;
          border-left: 3px solid var(--accent);
        }

        .sidebar-footer {
          margin-top: auto;
          padding: 16px;
          border-top: 1px solid var(--border);
        }
        .kbd-hint {
          font-size: 11px;
          color: var(--text-muted);
          text-align: center;
        }

        /* Content */
        .content {
          flex: 1;
          overflow-y: auto;
          overflow-x: hidden;
          scroll-behavior: smooth;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .content-inner {
          max-width: 860px;
          margin: 0 auto;
          padding: 32px 32px 60px;
        }

        /* Sections */
        .section {
          margin-bottom: 72px;
          scroll-margin-top: 24px;
        }

        .section-h1 {
          font-size: clamp(22px, 3vw, 32px);
          font-weight: 800;
          color: #f1f5f9;
          line-height: 1.3;
          margin-bottom: 20px;
          background: linear-gradient(135deg, #60a5fa, #a78bfa);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        .section-h2 {
          font-size: clamp(18px, 2.5vw, 24px);
          font-weight: 700;
          color: #f1f5f9;
          margin-bottom: 16px;
          padding-bottom: 10px;
          border-bottom: 2px solid var(--border);
        }
        .section-h3 {
          font-size: 16px;
          font-weight: 600;
          color: #cbd5e1;
          margin: 24px 0 12px;
        }

        p { margin-bottom: 14px; color: #cbd5e1; }

        /* Source badge */
        .source-badge {
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
          align-items: center;
          font-size: 12px;
          color: var(--text-muted);
          background: rgba(96,165,250,0.05);
          border: 1px solid rgba(96,165,250,0.2);
          border-radius: 6px;
          padding: 8px 12px;
          margin-bottom: 20px;
        }
        .source-badge a {
          color: var(--accent);
          text-decoration: none;
        }
        .source-badge a:hover { text-decoration: underline; }

        /* Blockquote */
        blockquote {
          border-left: 3px solid var(--accent);
          margin: 20px 0;
          padding: 12px 16px;
          background: rgba(96,165,250,0.05);
          border-radius: 0 8px 8px 0;
          color: #94a3b8;
          font-size: 13.5px;
          font-style: italic;
          line-height: 1.7;
        }
        blockquote cite {
          display: block;
          margin-top: 8px;
          font-size: 12px;
          font-style: normal;
          color: var(--text-muted);
        }

        /* SVG diagrams */
        .svg-wrap {
          background: #0a1628;
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 16px;
          margin: 20px 0;
          overflow-x: auto;
        }
        .diagram-svg {
          width: 100%;
          height: auto;
          display: block;
        }

        /* Code blocks */
        .code-block {
          background: #060d1a;
          border: 1px solid var(--border);
          border-radius: 8px;
          margin: 16px 0;
          overflow: hidden;
        }
        .code-header {
          background: var(--bg2);
          padding: 8px 16px;
          font-size: 12px;
          color: var(--text-muted);
          border-bottom: 1px solid var(--border);
          font-family: monospace;
        }
        .code-block pre {
          padding: 16px;
          overflow-x: auto;
          font-size: 12.5px;
          line-height: 1.6;
          color: #7dd3fc;
          font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
          white-space: pre;
          tab-size: 4;
        }
        code {
          background: rgba(96,165,250,0.12);
          color: #7dd3fc;
          padding: 2px 6px;
          border-radius: 4px;
          font-size: 12.5px;
          font-family: 'JetBrains Mono', Consolas, monospace;
        }

        /* Tables */
        .table-wrap {
          overflow-x: auto;
          margin: 16px 0;
          border-radius: 8px;
          border: 1px solid var(--border);
        }
        .data-table {
          width: 100%;
          border-collapse: collapse;
          font-size: 13px;
        }
        .data-table th {
          background: var(--bg2);
          color: var(--text-muted);
          font-weight: 600;
          font-size: 11px;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          padding: 10px 14px;
          text-align: left;
          border-bottom: 1px solid var(--border);
        }
        .data-table td {
          padding: 10px 14px;
          border-bottom: 1px solid rgba(51,65,85,0.5);
          color: #cbd5e1;
          vertical-align: top;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(96,165,250,0.04); }

        /* Badges */
        .badge {
          display: inline-block;
          padding: 2px 8px;
          border-radius: 4px;
          font-size: 11px;
          font-weight: 600;
        }
        .badge-blue { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .badge-green { background: rgba(52,211,153,0.15); color: #34d399; }
        .badge-purple { background: rgba(167,139,250,0.15); color: #a78bfa; }
        .badge-yellow { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .badge-red { background: rgba(248,113,113,0.15); color: #f87171; }

        /* Cards */
        .card-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
          gap: 14px;
          margin: 16px 0;
        }
        .info-card {
          background: var(--bg2);
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 16px;
          transition: border-color 0.2s;
        }
        .info-card:hover { border-color: var(--accent); }
        .card-icon { font-size: 24px; margin-bottom: 8px; }
        .card-title { font-weight: 600; font-size: 14px; color: #e2e8f0; margin-bottom: 6px; }
        .card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.6; }
        .card-blue { border-color: rgba(96,165,250,0.3); }
        .card-green { border-color: rgba(52,211,153,0.3); }
        .card-purple { border-color: rgba(167,139,250,0.3); }
        .card-yellow { border-color: rgba(251,191,36,0.3); }
        .card-red { border-color: rgba(248,113,113,0.3); }

        /* Info box */
        .info-box {
          background: rgba(96,165,250,0.05);
          border: 1px solid rgba(96,165,250,0.2);
          border-radius: 8px;
          padding: 16px;
          margin: 16px 0;
        }
        .info-box-title {
          font-weight: 600;
          color: var(--accent);
          margin-bottom: 10px;
          font-size: 14px;
        }
        .info-box ul { padding-left: 20px; }
        .info-box li { color: #94a3b8; font-size: 13.5px; margin-bottom: 4px; }

        /* Warning list */
        .warn-list { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
        .warn-item {
          display: flex;
          align-items: flex-start;
          gap: 12px;
          padding: 12px 16px;
          border-radius: 8px;
          font-size: 13.5px;
          border: 1px solid transparent;
        }

        .warn-blue { background: rgba(96,165,250,0.08); border-color: rgba(96,165,250,0.2); }
        .warn-green { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.2); }
        .warn-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
        .warn-item strong { color: var(--text); }

        .principle-block {

          gap: 20px;
          margin: 20px 0;
          padding: 20px;
          background: var(--bg2);
          border-radius: 10px;
          border: 1px solid var(--border);
        }
        .principle-number {
          flex-shrink: 0;
          font-size: 11px;
          font-weight: 700;
          color: var(--accent);
          background: rgba(96,165,250,0.1);
          border: 1px solid rgba(96,165,250,0.2);
          border-radius: 6px;
          padding: 4px 8px;
          height: fit-content;
          white-space: nowrap;
        }
        .principle-content { flex: 1; min-width: 0; }
        .principle-title {
          font-weight: 600;
          font-size: 15px;
          color: #f1f5f9;
          margin-bottom: 8px;
        }
        .principle-content p { margin: 0; font-size: 13.5px; }

        .final-summary {
          background: linear-gradient(135deg, rgba(59,130,246,0.05), rgba(167,139,250,0.05));
          border: 1px solid rgba(96,165,250,0.2);
          border-radius: 12px;
          padding: 24px;
          margin-top: 24px;
        }
        .summary-grid {
          display: flex;
          flex-direction: column;
          gap: 10px;
          margin-top: 12px;
        }
        .summary-item {
          display: flex;
          gap: 12px;
          align-items: flex-start;
          font-size: 13.5px;
          color: #94a3b8;
        }
        .summary-num {

          font-weight: 700;
          color: var(--accent);
          font-size: 12px;
          background: rgba(96,165,250,0.1);
          padding: 2px 6px;
          border-radius: 4px;
          margin-top: 1px;

          align-items: center;
          justify-content: space-between;
          gap: 16px;
          margin-top: 48px;
          padding: 20px;
          background: var(--bg2);
          border-radius: 10px;
          border: 1px solid var(--border);

        .nav-btn {
          background: none;
          border: 1px solid var(--border);
          color: var(--text-muted);
          padding: 8px 14px;
          border-radius: 6px;
          cursor: pointer;
          font-size: 12px;
          transition: all 0.15s;
          max-width: 220px;
          text-align: center;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .nav-btn:hover:not(:disabled) {
          background: rgba(96,165,250,0.08);
          border-color: var(--accent);
          color: var(--accent);
        }
        .nav-btn:disabled {
          opacity: 0.3;
          cursor: not-allowed;
        }
        .nav-indicator {
          font-size: 12px;
          color: var(--text-muted);
          white-space: nowrap;
        }

        a {
          color: var(--accent);
          text-decoration: none;
        }
        a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 768px) {
          .mobile-header { display: flex; }

            left: 0;

            z-index: 300;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
          }
          .sidebar.open {
            transform: translateX(0);
          }

          .sidebar-overlay {
            display: block;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 250;
          }

          .content-inner {
            padding: 20px 16px 48px;
          }

          .card-grid {
            grid-template-columns: 1fr 1fr;
          }

          .principle-block {
            flex-direction: column;
            gap: 12px;
          }

          .chapter-nav {
            flex-direction: column;
            gap: 10px;
            text-align: center;
          }
          .nav-btn {
            max-width: 100%;
            width: 100%;

            font-size: 11.5px;
          }

          .data-table {
            font-size: 12px;
          }
          .data-table th,
          .data-table td {
            padding: 8px 10px;
          }
        }
