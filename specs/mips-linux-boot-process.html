e:"text-indigo-400 hover:underline",children:"opensource.com — Analyzing the Linux boot process"})]})]})]})},{id:"ch-rest-init",group:"Linux Kernel 启动",title:"6. rest_init() 与多任务启动",content:c.jsxs("div",{children:[c.jsxs("p",{className:"text-slate-300 leading-relaxed mb-4",children:[c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"rest_init()"})," 是 ",c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"start_kernel()"})," 的最后一步， 也是内核从单线程同步模式过渡到多任务抢占模式的关键节点。"]}),c.jsxs("div",{className:"bg-slate-800 border border-slate-600 rounded-lg p-4 mb-4",children:[c.jsx("p",{className:"text-amber-300 font-semibold text-sm mb-2",children:"rest_init() 创建三个进程（来源：opensource.com）"}),c.jsx("pre",{className:"text-xs text-green-300 overflow-x-auto",children:`static noinline void __ref rest_init(void) {
    struct task_struct *tsk;
    int pid;

    rcu_scheduler_starting();

    /* 创建 kernel_init 线程，获得 PID 1 */
    pid = kernel_thread(kernel_init, NULL,
                        CLONE_FS | CLONE_SIGHAND);
    /*
     * Pin init on the boot CPU. Task migration is not
     * possible until sched_init_smp() runs.
     */
    rcu_read_lock();
    tsk = find_task_by_pid_ns(pid, &init_pid_ns);
    set_cpus_allowed_ptr(tsk, cpumask_of(smp_processor_id()));
    rcu_read_unlock();

    /* 创建 kthreadd 内核线程守护进程，获得 PID 2 */
    pid = kernel_thread(kthreadd, NULL,
                        CLONE_FS | CLONE_FILES);
    kthreadd_task = find_task_by_pid_ns(pid, &init_pid_ns);

    /* 通知 kernel_init: kthreadd 已就绪 */
    complete(&kthreadd_done);

    /*
     * The boot CPU 自身成为 idle 任务 (PID 0)
     * 调用 cpu_idle() 进入永久 idle 循环
     */
    cpu_startup_entry(CPUHP_ONLINE);
}`}),c.jsxs("p",{className:"text-xs text-slate-400 mt-2",children:["来源：",c.jsx("a",{href:"https://opensource.com/article/18/1/analyzing-linux-boot-process",target:"_blank",rel:"noopener",className:"text-indigo-400 hover:underline",children:"opensource.com — Analyzing the Linux boot process"})]})]}),c.jsx("div",{className:"grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4",children:[{pid:"PID 0",name:"idle / swapper",color:"bg-slate-700 border-slate-500",badge:"bg-slate-500",desc:"boot CPU 的 idle 线程，当无其他任务时运行 cpu_idle()，通过电源管理降低功耗。"},{pid:"PID 1",name:"kernel_init",color:"bg-indigo-900/40 border-indigo-500",badge:"bg-indigo-600",desc:"完成驱动初始化后通过 exec() 替换为 /sbin/init 或 systemd，成为用户空间 init。"},{pid:"PID 2",name:"kthreadd",color:"bg-teal-900/40 border-teal-500",badge:"bg-teal-600",desc:"内核线程守护进程，所有后续 kthread_create() 请求都路由到此处创建新内核线程。"}].map(m=>c.jsxs("div",{className:`${m.color} border rounded-lg p-3`,children:[c.jsxs("div",{className:"flex items-center gap-2 mb-2",children:[c.jsx("span",{className:`${m.badge} text-white text-xs font-bold px-2 py-0.5 rounded-full`,children:m.pid}),c.jsx("span",{className:"text-slate-200 text-sm font-semibold",children:m.name})]}),c.jsx("p",{className:"text-slate-400 text-xs",children:m.desc})]},m.pid))}),c.jsxs("div",{className:"bg-slate-800 border border-slate-600 rounded-lg p-4 mb-4",children:[c.jsx("p",{className:"text-amber-300 font-semibold text-sm mb-2",children:"kernel_init() 中的 do_initcalls()（来源：opensource.com）"}),c.jsxs("p",{className:"text-slate-300 text-sm mb-3",children:[c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"kernel_init()"})," 调用",c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"do_basic_setup()"})," →",c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"do_initcalls()"}),"， 按 7 个优先级依次执行所有用 ",c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"__initcall"})," 宏注册的初始化函数："]}),c.jsx("div",{className:"flex flex-wrap gap-     ...
    kernel_init_freeable(); // 包含 do_initcalls()

    /* exec 转换为用户空间 init */
    if (ramdisk_execute_command) {
        // 尝试 initramfs 中的 /init
        if (!run_init_process(ramdisk_execute_command))
            return 0;
    }

    if (execute_command) {
        // 尝试 init= 内核参数指定的路径
        if (!run_init_process(execute_command))
            return 0;
    }

    /* 依次尝试标准路径 */
    if (!try_to_run_init_process("/sbin/init") ||
        !try_to_run_init_process("/etc/init")  ||
        !try_to_run_init_process("/bin/init")  ||
        !try_to_run_init_process("/bin/sh"))
        return 0;

    panic("No working init found. "
          "Try passing init= option to kernel. "
          "See Linux Documentation/admin-guide/init.rst");
}`}),c.jsxs("p",{className:"text-xs text-slate-400 mt-2",children:["来源：",c.jsx("a",{href:"https://opensource.com/article/18/1/analyzing-linux-boot-process",target:"_blank",rel:"noopener",className:"text-indigo-400 hover:underline",children:"opensource.com — Analyzing the Linux boot process"})]})]}),c.jsxs("div",{className:"bg-slate-800 border border-slate-600 rounded-lg p-4 mb-4",children:[c.jsx("p",{className:"text-amber-300 font-semibold text-sm mb-2",children:"initramfs 的作用（来源：opensource.com）"}),c.jsxs("ul",{className:"text-slate-300 text-sm space-y-2",children:[c.jsxs("li",{className:"flex gap-2",children:[c.jsx("span",{className:"text-indigo-400",children:"▸"}),"加载根文件系统所需的内核模块（如 ext4、nvme 驱动），避免将所有驱动静态编译进内核使其过大"]}),c.jsxs("li",{className:"flex gap-2",children:[c.jsx("span",{className:"text-indigo-400",children:"▸"}),"处理加密根分区（如 LUKS）：在挂载前提示用户输入密码或从 TPM 获取密钥"]}),c.jsxs("li",{className:"flex gap-2",children:[c.jsx("span",{className:"text-indigo-400",children:"▸"}),"挂载 /proc /sys /dev 等虚拟文件系统，为后续初始化提供基础"]}),c.jsxs("li",{className:"flex gap-2",children:[c.jsx("span",{className:"text-indigo-400",children:"▸"}),"执行 ",c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"pivot_root"})," 或 ",c.jsx("code",{className:"bg-slate-700 px-1 rounded text-amber-300",children:"switch_root"}),"，将根文件系统切换为真实存储设备上的文件系统"]})]}),c.jsxs("p",{className:"text-xs text-slate-400 mt-3",children:['"The initrd for the most part is simply a minimal Linux root filesystem. Nearly all the executables in /bin and /sbin inside the ramdisk are symlinks to the BusyBox binary." — ',c.jsx("a",{href:"https://opensource.com/article/18/1/analyzing-linux-boot-process",target:"_blank",rel:"noopener",className:"text-indigo-400 hover:underline",children:"opensource.com"})]})]}),c.jsxs("div",{className:"bg-slate-800 border border-slate-600 rounded-lg p-4 mb-4",children:[c.jsx("p",{className:"text-amber-300 font-semibold text-sm mb-2",children:"嵌入式 MIPS 设备（如路由器）的典型 initramfs 流程"}),c.jsx("di
