modprobe libcomposite

# 2. 挂载 configfs（若未挂载）
mount -t configfs none /sys/kernel/config
CONFIGFS=/sys/kernel/config/usb_gadget

# 3. 创建 gadget 目录
mkdir $CONFIGFS/g1
cd $CONFIGFS/g1

# 4. 设置 VID/PID
echo 0x1d6b > idVendor    # Linux Foundation
echo 0x0104 > idProduct

# 5. 创建字符串描述符（英文 0x409）
mkdir strings/0x409
echo "000001"        > strings/0x409/serialnumber
echo "My Company"    > strings/0x409/manufacturer
echo "Composite Dev" > strings/0x409/product

# 6. 创建配置
mkdir configs/c.1
mkdir configs/c.1/strings/0x409
echo "Config 1" > configs/c.1/strings/0x409/configuration
echo 120        > configs/c.1/MaxPower   # 120mA

# 7. 创建功能（会自动加载 usb_f_acm.ko / usb_f_ecm.ko）
mkdir functions/acm.usb0
mkdir functions/ecm.usb0

# 8. 关联功能到配置（符号链接）
ln -s functions/acm.usb0 configs/c.1/
ln -s functions/ecm.usb0 configs/c.1/

# 9. 绑定到 UDC，激活 gadget
ls /sys/class/udc          # 查看可用 UDC 名
echo s3c-hsotg > UDC

# 撤销步骤（反向）
echo "" > UDC
rm configs/c.1/acm.usb0 configs/c.1/ecm.usb0
rmdir configs/c.1/strings/0x409
rmdir configs/c.1
