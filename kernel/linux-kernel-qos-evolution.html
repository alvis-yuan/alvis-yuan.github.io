        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f1f5f9; color: #1e293b; }

        .app-root { min-height: 100vh; position: relative; }

        /* Progress bar */
        .progress-bar {
          position: fixed; top: 0; left: 0; height: 3px;
          background: linear-gradient(90deg, #6366f1, #22c55e);
          z-index: 1000; transition: width 0.1s linear;
        }

        /* Mobile header */
        .mobile-header {
          display: none;
          position: fixed; top: 3px; left: 0; right: 0;
          height: 52px; background: #1e293b; color: white;
          align-items: center; padding: 0 1rem; gap: 0.75rem;
          z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .hamburger {
          background: none; border: none; cursor: pointer;
          display: flex; flex-direction: column; gap: 5px; padding: 4px;
        }
        .hamburger span {
          display: block; width: 22px; height: 2px; background: white; border-radius: 2px;
        }
        .mobile-title { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
        .chapter-hint {
          font-size: 0.75rem; color: #94a3b8;
          overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
        }

        /* Layout */
        .layout {
          display: flex; min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
          width: 260px; min-width: 260px; background: #1e293b;
          position: sticky; top: 0; height: 100vh;
          overflow-y: auto; z-index: 100;
          scrollbar-width: thin; scrollbar-color: #334155 transparent;
        }
        .sidebar-inner { padding: 1rem 0.75rem 2rem; }
        .sidebar-logo {
          display: flex; align-items: center; gap: 0.6rem;
          padding: 0.75rem 0.5rem 1.25rem;
          font-size: 0.95rem; font-weight: 700; color: white;
          border-bottom: 1px solid #334155; margin-bottom: 0.75rem;
        }
        .nav-group { margin-bottom: 0.5rem; }
        .nav-group-label {
          font-size: 0.7rem; font-weight: 700; color: #64748b;
          text-transform: uppercase; letter-spacing: 0.08em;
          padding: 0.4rem 0.5rem 0.2rem;
        }
        .nav-item {
          display: block; width: 100%;
          background: none; border: none; cursor: pointer; text-align: left;
          padding: 0.45rem 0.75rem; border-radius: 6px;
          font-size: 0.82rem; color: #94a3b8;
          transition: all 0.15s; line-height: 1.4;
        }
        .nav-item:hover { background: #334155; color: #e2e8f0; }
        .nav-item.active { background: #312e81; color: #a5b4fc; font-weight: 600; }
        .sidebar-footer { padding: 1rem 0.5rem 0; border-top: 1px solid #334155; margin-top: 1rem; }
        .keyboard-hint { font-size: 0.72rem; color: #475569; text-align: center; }
        .overlay {
          display: none; position: fixed; inset: 0;
          background: rgba(0,0,0,0.5); z-index: 150;
        }

        /* Main content */
        .content {
          flex: 1; overflow-y: auto; height: 100vh;
          scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent;
        }
        .content-inner {
          max-width: 860px; margin: 0 auto;
          padding: 2rem 2rem 4rem;
        }

        /* Sections */
        section {
          margin-bottom: 4rem;
          scroll-margin-top: 1rem;
        }
        .section-badge {
          display: inline-block;
          background: #e0e7ff; color: #4338ca;
          font-size: 0.72rem; font-weight: 700;
          letter-spacing: 0.08em; text-transform: uppercase;
          padding: 0.2rem 0.6rem; border-radius: 4px; margin-bottom: 0.6rem;
        }
        .era-badge { background: #fef3c7; color: #92400e; }
        h1 { font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 800; color: #0f172a; line-height: 1.3; margin-bottom: 1rem; }
        h2 { font-size: clamp(1.2rem, 2.5vw, 1.5rem); font-weight: 700; color: #1e293b; margin-bottom: 0.75rem; padding-top: 0.5rem; }
        h3 { font-size: 1rem; font-weight: 700; color: #334155; margin: 1.25rem 0 0.5rem; }
        h4 { font-size: 0.95rem; font-weight: 700; color: #1e293b; margin-bottom: 0.4rem; }
        p { color: #475569; line-height: 1.7; margin-bottom: 0.75rem; font-size: 0.9rem; }
        .lead { font-size: 1rem; color: #334155; }
        a { color: #4f46e5; text-decoration: none; }
        a:hover { text-decoration: underline; }
        code {
          background: #f1f5f9; border: 1px solid #e2e8f0;
          padding: 0.1em 0.4em; border-radius: 4px;
          font-size: 0.82em; font-family: 'JetBrains Mono', 'Fira Code', monospace;
          color: #be185d;
        }

        /* Era meta */
        .era-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .era-tag {
          background: #f8fafc; border: 1px solid #e2e8f0;
          padding: 0.2rem 0.6rem; border-radius: 999px;
          font-size: 0.78rem; color: #64748b;
        }

        /* Info box */
        .info-box {
          background: #f0f9ff; border-left: 4px solid #38bdf8;
          padding: 1rem 1.25rem; border-radius: 0 8px 8px 0;
          margin: 1rem 0;
        }
        .info-box strong { color: #0369a1; }
        .info-box ul { margin: 0.5rem 0 0 1.2rem; }
        .info-box li { font-size: 0.85rem; color: #0c4a6e; line-height: 1.8; }

        /* Alert box */
        .alert-box {
          background: #fff7ed; border-left: 4px solid #f97316;
          padding: 0.75rem 1rem; border-radius: 0 8px 8px 0;
          margin: 1rem 0; font-size: 0.88rem; color: #7c2d12;
        }

        /* Principle box */
        .principle-box {
          background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
          border: 1px solid #c4b5fd; border-radius: 10px;
          padding: 1.25rem 1.5rem; margin: 1.5rem 0;
        }
        .principle-box h3 { color: #6d28d9; margin-top: 0; font-size: 0.95rem; }
        .principle-box p { color: #4c1d95; font-size: 0.88rem; margin-bottom: 0; }
        .principle-box strong { color: #5b21b6; }
        .principle-box em { color: #7c3aed; }

        /* SVG */
        .svg-wrap {
          background: white; border: 1px solid #e2e8f0;
          border-radius: 10px; padding: 1rem;
          margin: 1rem 0; overflow-x: auto;
        }
        .diagram { width: 100%; height: auto; display: block; }

        /* Card grid */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .card {
          border-radius: 10px; padding: 1rem; border: 1px solid transparent;
        }
        .card-blue { background: #eff6ff; border-color: #bfdbfe; }
        .card-teal { background: #f0fdfa; border-color: #99f6e4; }
        .card-purple { background: #faf5ff; border-color: #e9d5ff; }
        .card h4 { margin-bottom: 0.5rem; }
        .card p { font-size: 0.85rem; margin-bottom: 0.5rem; }
        .card code { display: block; font-size: 0.75rem; margin-top: 0.5rem; word-break: break-all; }

        /* Algo grid */
        .algo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .algo-card { border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; background: white; }
        .algo-header {
          display: flex; justify-content: space-between; align-items: center;
          padding: 0.6rem 1rem; flex-wrap: wrap; gap: 0.25rem;
        }
        .algo-name { font-size: 0.9rem; font-weight: 700; color: #1e293b; }
        .algo-year { font-size: 0.72rem; color: #64748b; }
        .algo-body { padding: 0.75rem 1rem; }
        .algo-body p { font-size: 0.84rem; margin-bottom: 0.4rem; }
        .algo-body strong { color: #1e293b; }
        .algo-ref { font-size: 0.78rem; color: #64748b; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #f1f5f9; }

        /* Tables */
        .table-wrap { overflow-x: auto; margin: 1rem 0; border-radius: 10px; border: 1px solid #e2e8f0; }
