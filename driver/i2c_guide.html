#include <linux/i2c.h>
#include <linux/platform_device.h>

/* 1. 定义 algorithm 操作集 */
static int my_i2c_master_xfer(struct i2c_adapter *adap,
                               struct i2c_msg *msgs, int num)
{
    struct my_i2c_priv *priv = i2c_get_adapdata(adap);
    int i, ret;
    
    for (i = 0; i < num; i++) {
        /* 发送 START + 地址 + 数据 */
        ret = my_hw_xfer(priv, &msgs[i]);
        if (ret < 0)
            return ret;
    }
    return num;  /* 返回成功传输的消息数 */
}

static u32 my_i2c_functionality(struct i2c_adapter *adap)
{
    return I2C_FUNC_I2C | I2C_FUNC_SMBUS_EMUL;
}

static const struct i2c_algorithm my_i2c_algo = {
    .master_xfer  = my_i2c_master_xfer,
    .functionality = my_i2c_functionality,
};

/* 2. probe 函数：注册 adapter */
static int my_i2c_probe(struct platform_device *pdev)
{
    struct my_i2c_priv *priv;
    struct i2c_adapter *adap;
    
    priv = devm_kzalloc(&pdev->dev, sizeof(*priv), GFP_KERNEL);
    adap = &priv->adap;
    
    adap->owner   = THIS_MODULE;
    adap->algo    = &my_i2c_algo;
    adap->dev.parent = &pdev->dev;
    adap->dev.of_node = pdev->dev.of_node;
    strlcpy(adap->name, "my-i2c", sizeof(adap->name));
    
    i2c_set_adapdata(adap, priv);
    
    return i2c_add_adapter(adap);  /* 或 i2c_add_numbered_adapter() */
}

static int my_i2c_remove(struct platform_device *pdev)
{
    struct my_i2c_priv *priv = platform_get_drvdata(pdev);
    i2c_del_adapter(&priv->adap);
    return 0;
}`}),c.jsx("h3",{style:Ol,children:"总线恢复（Bus Recovery）"}),c.jsxs("p",{style:xl,children:["Linux 内核提供 ",c.jsx("code",{style:Lt,children:"struct i2c_bus_recovery_info"})," 机制，当总线检测到 SDA 被锁定低（Slave 在 SCL 低时崩溃）时，可通过发送 9 个时钟脉冲来恢复总线（SMBUS spec §4.3.8 / UM10204 §3.1.16）。"]}),c.jsx(Bt,{children:`static struct i2c_bus_recovery_info my_recovery_info = {

协议层（I2C Core）：START → 地址+方向 → 数据字节 → ACK → STOP
驱动层（分层）：
