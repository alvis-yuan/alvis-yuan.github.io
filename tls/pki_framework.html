        :root {
          --primary: #1e40af;
          --primary-light: #3b82f6;
          --accent: #0ea5e9;
          --accent2: #8b5cf6;
          --bg: #0f172a;
          --bg2: #1e293b;
          --bg3: #334155;
          --text: #e2e8f0;
          --text2: #94a3b8;
          --border: #334155;
          --sidebar-w: 260px;
          --green: #10b981;
          --orange: #f59e0b;
          --red: #ef4444;
          --yellow: #eab308;
        }
        html { scroll-behavior: smooth; }
        body { 
          font-family: 'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
          background: var(--bg);
          color: var(--text);
          line-height: 1.7;
          overflow-x: hidden;
        }

        /* Progress bar */
        #progress-bar-container {
          position: fixed; top: 0; left: 0; right: 0; height: 3px;
          background: var(--bg3); z-index: 1000;
        }
        #progress-bar {
          height: 100%; width: 0%;
          background: linear-gradient(90deg, var(--primary-light), var(--accent));
          transition: width 0.1s;
        }

        /* Top header */
        #topbar {
          position: fixed; top: 3px; left: 0; right: 0;
          height: 52px; background: rgba(15,23,42,0.95);
          backdrop-filter: blur(8px);
          border-bottom: 1px solid var(--border);
          display: flex; align-items: center;
          padding: 0 16px; z-index: 900;
          gap: 12px;
        }
        #hamburger {
          display: none; flex-direction: column; gap: 5px;
          cursor: pointer; padding: 4px; background: none; border: none;
        }
        #hamburger span {
          display: block; width: 22px; height: 2px;
          background: var(--text2); border-radius: 2px;
          transition: 0.3s;
        }
        #topbar-title {
          font-size: 15px; font-weight: 700; color: var(--text);
          letter-spacing: 0.5px;
        }
        #topbar-badge {
          margin-left: auto; font-size: 11px; color: var(--text2);
          background: var(--bg3); padding: 2px 8px; border-radius: 99px;
        }

        /* Overlay */
        #overlay {
          display: none; position: fixed; inset: 0;
          background: rgba(0,0,0,0.5); z-index: 800;
        }
        #overlay.show { display: block; }

        /* Sidebar */
        #sidebar {
          position: fixed; top: 55px; left: 0; bottom: 0;
          width: var(--sidebar-w);
          background: var(--bg2);
          border-right: 1px solid var(--border);
          overflow-y: auto; z-index: 850;
          transition: transform 0.3s;
          padding: 12px 0 24px;
        }
        .nav-group-label {
          font-size: 10px; font-weight: 700; letter-spacing: 1px;
          color: var(--text2); padding: 12px 16px 4px;
          text-transform: uppercase;
        }
        .nav-link {
          display: flex; align-items: center; gap: 8px;
          padding: 8px 16px; font-size: 13px; color: var(--text2);
          text-decoration: none; border-left: 3px solid transparent;
          transition: all 0.2s;
        }
        .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
        .nav-link.active {
          color: var(--primary-light);
          border-left-color: var(--primary-light);
          background: rgba(59,130,246,0.1);
          font-weight: 600;
        }
        .nav-num {
          font-size: 11px; color: var(--text2);
          background: var(--bg3); border-radius: 4px;
          padding: 1px 5px; min-width: 20px; text-align: center;
        }
        .nav-link.active .nav-num { background: var(--primary-light); color: #fff; }

        /* Main content */
        #main {
          margin-left: var(--sidebar-w);
          margin-top: 55px;
          padding: 0;
          min-height: calc(100vh - 55px);
        }

        section {
          max-width: 860px;
          margin: 0 auto;
          padding: 48px 32px;
          border-bottom: 1px solid var(--border);
        }
        section:last-child { border-bottom: none; }

        h1 { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 8px; }
        h2 {
          font-size: 1.5rem; font-weight: 700; color: #fff;
          margin-bottom: 20px; padding-bottom: 10px;
          border-bottom: 2px solid var(--primary);
          display: flex; align-items: center; gap: 10px;
        }
        h2 .sec-num {
          font-size: 13px; background: var(--primary);
          color: #fff; padding: 2px 8px; border-radius: 6px;
        }
        h3 { font-size: 1.1rem; font-weight: 700; color: var(--primary-light); margin: 24px 0 10px; }
        p { color: var(--text); margin-bottom: 14px; font-size: 15px; line-height: 1.8; }
        strong { color: #fff; }

        .hero {
          background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
          border-bottom: 1px solid var(--border);
          padding: 60px 32px 48px;

        .hero-subtitle {

        .hero-meta {
          display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px;

        .hero-tag {

          border: 1px solid var(--border); color: var(--text2);
          background: var(--bg3);

        /* Source link */
        .source-box {

          border: 1px solid rgba(59,130,246,0.25);

        }
        .source-box a { color: var(--primary-light); text-decoration: none; }
        .source-box a:hover { text-decoration: underline; }

        .card-grid {
          display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
          gap: 16px; margin: 20px 0;
        }
        .card {
          background: var(--bg2); border: 1px solid var(--border);
          border-radius: 10px; padding: 18px;
        }
        .card-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .card-body { font-size: 13px; color: var(--text2); line-height: 1.6; }
        .card-icon { font-size: 24px; margin-bottom: 10px; }

        /* Info boxes */
        .infobox {

        .infobox.blue {

          border-left: 4px solid var(--primary-light);
        }
        .infobox.orange {
          background: rgba(245,158,11,0.08);
          border-left: 4px solid var(--orange);
        }
        .infobox.red {
          background: rgba(239,68,68,0.08);
          border-left: 4px solid var(--red);
        }
        .infobox.green {
          background: rgba(16,185,129,0.08);
          border-left: 4px solid var(--green);
        }
        .infobox.purple {
          background: rgba(139,92,246,0.08);
          border-left: 4px solid var(--accent2);
        }
        .infobox-title { font-weight: 700; color: #fff; margin-bottom: 4px; }

        /* Table */
        .data-table {
          width: 100%; border-collapse: collapse;
          margin: 16px 0; font-size: 13px;
          overflow-x: auto; display: block;
        }
        .data-table th {
          background: var(--bg3); color: var(--text);
          padding: 10px 14px; text-align: left;
          font-weight: 700; border: 1px solid var(--border);
          white-space: nowrap;
        }
        .data-table td {
          padding: 9px 14px; border: 1px solid var(--border);
          color: var(--text2); vertical-align: top;
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* Timeline */
        .timeline { position: relative; padding-left: 28px; margin: 20px 0; }
        .timeline::before {
          content: ''; position: absolute; left: 6px; top: 0; bottom: 0;
          width: 2px; background: var(--border);
        }
        .tl-item { position: relative; margin-bottom: 24px; }
        .tl-dot {
          position: absolute; left: -26px; top: 4px;
          width: 12px; height: 12px; border-radius: 50%;
          background: var(--primary-light); border: 2px solid var(--bg);
        }
        .tl-year { font-size: 12px; color: var(--accent); font-weight: 700; margin-bottom: 2px; }
        .tl-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .tl-desc { font-size: 13px; color: var(--text2); }

        /* SVG diagrams */
        .svg-wrap {
          background: var(--bg2); border: 1px solid var(--border);
          border-radius: 12px; padding: 20px;
          margin: 20px 0; overflow-x: auto;
        }
        .svg-caption {
          text-align: center; font-size: 12px; color: var(--text2);
          margin-top: 10px;
        }
        svg text { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; }

        /* Keyboard hint */
        .kbd-hint {
          display: flex; align-items: center; gap: 8px;
          font-size: 12px; color: var(--text2); margin-top: 16px;
        }
        .kbd {
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 4px; padding: 2px 6px;
          font-size: 11px; color: var(--text);
        }

        /* Responsive */
        @media (max-width: 1023px) {
          #hamburger { display: flex; }
          #sidebar {
            transform: translateX(-100%);
          }
          #sidebar.open { transform: translateX(0); }
          #main { margin-left: 0; }
          section { padding: 36px 16px; }
          .hero { padding: 40px 16px 32px; }
          h1 { font-size: 1.5rem; }
          h2 { font-size: 1.2rem; }
        }
        @media (max-width: 480px) {
          .card-grid { grid-template-columns: 1fr; }
          section { padding: 28px 14px; }
        }

        /* Two-col layout */
        .two-col {
          display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
          margin: 16px 0;
        }
        @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

        /* Step list */
        .step-list { list-style: none; padding: 0; margin: 16px 0; }
        .step-list li {
          display: flex; gap: 12px; align-items: flex-start;
          margin-bottom: 14px;
        }
        .step-num {
          min-width: 28px; height: 28px;
          background: var(--primary); color: #fff;
          border-radius: 50%; display: flex; align-items: center; justify-content: center;
          font-size: 13px; font-weight: 700; flex-shrink: 0;
        }
        .step-content { font-size: 14px; color: var(--text2); padding-top: 3px; }
        .step-content strong { color: var(--text); }

        /* Badge */
        .badge {
          display: inline-block; font-size: 11px; padding: 2px 8px;
          border-radius: 99px; font-weight: 700; margin: 2px;
        }
        .badge-blue { background: rgba(59,130,246,0.2); color: var(--primary-light); }
        .badge-green { background: rgba(16,185,129,0.2); color: var(--green); }
        .badge-orange { background: rgba(245,158,11,0.2); color: var(--orange); }
        .badge-red { background: rgba(239,68,68,0.2); color: var(--red); }
        .badge-purple { background: rgba(139,92,246,0.2); color: var(--accent2); }

        .divider { 
          border: none; border-top: 1px solid var(--border);
          margin: 24px 0;
        }
